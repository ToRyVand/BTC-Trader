<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔ ARK CAPITAL — TRADING FLOOR 98</title>

<!-- SNES.css Framework -->
<link rel="stylesheet" href="https://unpkg.com/snes.css@1.0.1/dist/snes.min.css">

<!-- Press Start 2P Font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  background: #000;
  font-family: 'Press Start 2P', monospace;
  padding: 0;
  margin: 0;
}

#hdr {
  background: #1a1a1a;
  border-bottom: 4px solid #4a9eff;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
}

#logo {
  font-size: 14px;
  color: #4ade80;
}

.status {
  padding: 12px;
  background: #1a1a1a;
  border: 3px solid #4ade80;
  margin: 16px;
  text-align: center;
  font-size: 8px;
  color: #4ade80;
}

#canvas-container {
  background: #1a1a1a;
  border: 4px solid #4a9eff;
  padding: 16px;
  margin: 16px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 500px;
}

#trading-floor-canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 2px solid #888;
  background: #000;
  display: block;
}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">⚔ ARK CAPITAL 98</div>
</div>

<div class="status" id="status">Inicializando...</div>

<div id="canvas-container">
  <canvas id="trading-floor-canvas" width="640" height="480"></canvas>
</div>

<script>
// JavaScript inline - SIN ES6 modules para evitar problemas con Brave
console.log('[Inline] Starting...');

const canvas = document.getElementById('trading-floor-canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

// Disable image smoothing for pixel-perfect rendering
ctx.imageSmoothingEnabled = false;

console.log('[Inline] Canvas:', canvas.width, 'x', canvas.height);
status.textContent = `✓ Canvas: ${canvas.width}x${canvas.height}px`;

// Simple game loop
let fps = 0;
let frameCount = 0;
let lastFpsUpdate = performance.now();
let lastFrameTime = performance.now();

// Agent data
const agents = [
  { id: 'tech', name: 'TICKER', x: 50, y: 100, color: '#4a9eff' },
  { id: 'quant', name: 'LA MAQUINA', x: 200, y: 100, color: '#4ade80' },
  { id: 'fund', name: 'ECONOMISTA', x: 350, y: 100, color: '#fbbf24' },
  { id: 'sent', name: 'PERIODISTA', x: 500, y: 100, color: '#a855f7' },
  { id: 'risk', name: 'JEFE RIESGO', x: 125, y: 300, color: '#f87171' }
];

function render() {
  // Clear canvas
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw checkerboard floor
  const tileSize = 32;
  for (let y = 0; y < 15; y++) {
    for (let x = 0; x < 20; x++) {
      const isLight = (x + y) % 2 === 0;
      ctx.fillStyle = isLight ? '#1a1a1a' : '#0a0a0a';
      ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
    }
  }
  
  // Draw agents
  agents.forEach(agent => {
    // Agent sprite (simple square)
    ctx.fillStyle = agent.color;
    ctx.fillRect(agent.x, agent.y, 24, 24);
    
    // Agent name
    ctx.fillStyle = agent.color;
    ctx.font = '6px "Press Start 2P"';
    ctx.fillText(agent.name, agent.x, agent.y - 4);
  });
  
  // Draw FPS counter
  ctx.fillStyle = '#4ade80';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText(`FPS: ${fps}`, 10, 20);
  ctx.fillText(`Agents: ${agents.length}`, 10, 35);
}

function gameLoop() {
  const currentTime = performance.now();
  const deltaTime = (currentTime - lastFrameTime) / 1000;
  lastFrameTime = currentTime;
  
  // Update FPS
  frameCount++;
  if (currentTime - lastFpsUpdate >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsUpdate = currentTime;
  }
  
  // Render
  render();
  
  // Next frame
  requestAnimationFrame(gameLoop);
}

// Start game loop
console.log('[Inline] Starting game loop...');
gameLoop();

console.log('[Inline] ✓ Dashboard initialized successfully!');
</script>

</body>
</html>
